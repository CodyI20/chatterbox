<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterbox TTS Interface</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: #fff; padding: 20px; max-width: 600px; margin: auto; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        textarea, select, input[type="range"] { width: 100%; margin-top: 5px; margin-bottom: 15px; }
        textarea { height: 100px; background: #444; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 4px; resize: vertical; }
        select { background: #444; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 4px; }
        button { background: #0078D7; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background: #005A9E; }
        details { background: #333; padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #555; }
        summary { cursor: pointer; font-weight: bold; }
        .slider-container { margin-top: 10px; }
        audio { width: 100%; margin-top: 20px; outline: none; }
        #loading { display: none; text-align: center; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

<div class="card">
    <h2>Chatterbox Studio</h2>
    
    <label for="textInput">Text to Speech:</label>
    <textarea id="textInput" placeholder="Enter text here... You can use tags like [laugh]!"></textarea>

    <label for="voiceSelect">Voice:</label>
    <select id="voiceSelect">
        <option value="Orweyna.wav">Loading voices...</option>
    </select>

    <details>
        <summary>Advanced Settings</summary>
        <div class="slider-container">
            <label for="exaggeration">Exaggeration (Emotion): <span id="exagVal">1.0</span></label>
            <input type="range" id="exaggeration" min="0" max="2" step="0.1" value="1.0" oninput="document.getElementById('exagVal').innerText = this.value">
        </div>
        <div class="slider-container">
            <label for="cfgWeight">CFG Weight (Pacing): <span id="cfgVal">0.5</span></label>
            <input type="range" id="cfgWeight" min="0" max="1" step="0.1" value="0.5" oninput="document.getElementById('cfgVal').innerText = this.value">
        </div>
        <div class="slider-container">
            <label for="temperature">Temperature (Randomness): <span id="tempVal">0.8</span></label>
            <input type="range" id="temperature" min="0.5" max="0.8" step="0.01" value="0.8" oninput="document.getElementById('tempVal').innerText=this.value">
        </div>
    </details>

    <button onclick="generateAudio()">Generate Audio</button>
    <div id="loading">Generating... This might take a moment.</div>

    <audio id="audioPlayer" controls></audio>
</div>

<script>
    // Fetch available voices when the page loads
    fetch('/voices')
        .then(response => response.json())
        .then(voices => {
            const select = document.getElementById('voiceSelect');
            select.innerHTML = ''; // Clears the "Loading voices..." text
            voices.forEach(voice => {
                let option = document.createElement('option');
                option.value = voice;
                option.text = voice.substring(0, voice.lastIndexOf('.')) || voice;
                select.appendChild(option);
            });
        });

    function generateAudio() {
        const text = document.getElementById('textInput').value;
        const voice = document.getElementById('voiceSelect').value;
        const exaggeration = parseFloat(document.getElementById('exaggeration').value);
        const cfg_weight = parseFloat(document.getElementById('cfgWeight').value);
        const temperature = parseFloat(document.getElementById('temperature').value);
        
        if(!text) return alert("Please enter some text!");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('audioPlayer').style.display = 'none';

        const payload = {
            text: text,
            voice: voice,
            settings: {
                exaggeration: exaggeration,
                cfg_weight: cfg_weight,
                temperature: temperature
            }
        };

        fetch('/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (!response.ok) throw new Error("Server error");
            return response.blob();
        })
        .then(blob => {
            const audioUrl = URL.createObjectURL(blob);
            const player = document.getElementById('audioPlayer');
            player.src = audioUrl;
            player.style.display = 'block';
            player.play();
        })
        .catch(error => alert("Failed to generate audio. Check server logs."))
        .finally(() => {
            document.getElementById('loading').style.display = 'none';
        });
    }
</script>

</body>
</html>
